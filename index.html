<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Money</title>
    <link rel="stylesheet" href="styles.css" />
    <!-- apply saved theme before paint to avoid a flash -->
    <script>
      try {
        var t = localStorage.getItem("money.theme");
        if (t) document.documentElement.setAttribute("data-theme", t);
      } catch (e) {}
    </script>
  </head>
  <body>
    <!-- toggle: opens the sidebar -->
    <button id="sidebarToggle" class="sidebar-toggle" aria-label="Open menu">☰</button>

    <!-- theme toggle: light / dark -->
    <button id="themeToggle" class="theme-toggle" aria-label="Toggle dark mode"></button>

    <!-- the sliding pane: menu + libraries live here -->
    <aside id="sidebar" class="sidebar">
      <header class="sidebar-head">
        <span class="brand"><span class="brand-dot"></span> MONEY</span>
        <button id="sidebarClose" class="sidebar-close" aria-label="Close menu">✕</button>
      </header>

      <div class="sidebar-scroll">
        <section class="sidebar-section">
          <div class="section-title">Widget Library</div>
          <div id="library" class="library"></div>
          <div class="section-hint">click to add / remove from the board</div>
        </section>

        <section class="sidebar-section" id="iconSection">
          <button class="section-toggle" id="iconToggle" type="button">
            <span class="section-title">Icon Library</span>
            <span class="section-caret">▾</span>
          </button>
          <div class="section-body"><div class="section-body-inner">
            <input id="iconSearch" class="icon-search" type="text" placeholder="search icons…" />
            <div id="iconGrid" class="icon-grid"></div>
            <div class="section-hint">drag an icon onto a widget to stamp it, or onto empty space for a sticker · powered by Lucide</div>
          </div></div>
        </section>

        <section class="sidebar-section">
          <div class="section-title">Menu</div>
          <button class="menu-item" id="resetLayout">↺ Reset layout</button>
        </section>
      </div>
    </aside>

    <!-- the board: widgets are drawn here -->
    <div id="board" class="board"></div>

    <footer class="foot">money · v1.2 — the math</footer>

    <!-- data-sources slide-out -->
    <div class="sources-panel" id="sourcesPanel"></div>

    <!-- a little jogger hovering above the status pills -->
    <div class="jogger" aria-hidden="true">
      <svg viewBox="0 0 44 60">
        <g class="jog-body">
          <!-- back leg (thigh → shin) -->
          <g class="thigh tB"><rect class="seg" x="21" y="32" width="2" height="9.4" rx="1" />
            <g class="shin sB"><rect class="seg" x="21.1" y="41" width="1.8" height="9.4" rx="0.9" /></g></g>
          <!-- back arm (upper → forearm) -->
          <g class="uarm aB"><rect class="seg" x="21.2" y="18" width="1.7" height="6.4" rx="0.85" />
            <g class="farm fB"><rect class="seg" x="21.2" y="24" width="1.6" height="6.2" rx="0.8" /></g></g>
          <!-- torso -->
          <rect class="torso" x="21" y="15" width="2" height="17" rx="1" />
          <!-- suffering goat head -->
          <g class="goat-head">
            <path class="goat-line" d="M19.6 7 C17.8 5.2 17.4 3.4 18.6 2" />
            <path class="goat-line" d="M24.4 7 C23.2 4.8 23.2 3.2 24 1.9" />
            <ellipse class="goat-fill" cx="16.6" cy="10.2" rx="2.6" ry="1.1" transform="rotate(38 16.6 10.2)" />
            <ellipse class="goat-fill" cx="27.4" cy="10.2" rx="2.6" ry="1.1" transform="rotate(-38 27.4 10.2)" />
            <ellipse class="goat-fill" cx="22" cy="10" rx="4.4" ry="4.1" />
            <ellipse class="goat-fill" cx="22" cy="12.8" rx="2.7" ry="2" />
            <circle class="goat-ink" cx="21" cy="12.9" r="0.4" />
            <circle class="goat-ink" cx="23" cy="12.9" r="0.4" />
            <path class="goat-eye" d="M19.4 8.7 l1.6 1.6 M21 8.7 l-1.6 1.6" />
            <path class="goat-eye" d="M23 8.7 l1.6 1.6 M24.6 8.7 l-1.6 1.6" />
            <ellipse class="goat-ink" cx="22" cy="13.6" rx="0.9" ry="0.6" />
            <path class="goat-ink-fill" d="M20.7 14.4 L22 18 L23.3 14.4 Z" />
            <path class="goat-sweat" d="M28.4 4.2 q1 1.4 0 2.3 q-1 -0.9 0 -2.3 z" />
          </g>
          <!-- front arm -->
          <g class="uarm aA"><rect class="seg" x="21.2" y="18" width="1.7" height="6.4" rx="0.85" />
            <g class="farm fA"><rect class="seg" x="21.2" y="24" width="1.6" height="6.2" rx="0.8" /></g></g>
          <!-- front leg -->
          <g class="thigh tA"><rect class="seg" x="21" y="32" width="2" height="9.4" rx="1" />
            <g class="shin sA"><rect class="seg" x="21.1" y="41" width="1.8" height="9.4" rx="0.9" /></g></g>
        </g>
      </svg>
    </div>

    <!-- bottom-right status: data sources + sync health -->
    <div class="status-bar">
      <button id="soundtrack" class="status-pill" title="soundtrack on / off"><span class="snd-note">♪</span></button>
      <button id="sourcesBtn" class="status-pill" title="data sources"><span class="src-count">…</span>&nbsp;sources</button>
      <button id="syncHealth" class="status-pill" title="click to sync now"><span class="sync-dot"></span><span class="sync-text">…</span></button>
    </div>

    <!-- hidden YouTube audio player for the soundtrack -->
    <div id="ytAudio" class="yt-hidden"></div>

    <!-- free icon library (Lucide) + our engine, both deferred so the page paints first -->
    <script src="https://www.youtube.com/iframe_api"></script>
    <script defer src="https://unpkg.com/lucide@latest"></script>
    <script defer src="app.js"></script>
    <script defer src="cursor.js"></script>
  </body>
</html>
